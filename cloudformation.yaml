AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Document Processing Backend — 11 Lambda functions, SQS queues,
  DynamoDB, Bedrock, Textract, and an API Gateway REST API.

# ══════════════════════════════════════════════════════════════════════════════
# PARAMETERS
# ══════════════════════════════════════════════════════════════════════════════

Parameters:

  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment tag.

  # ── Lambda code location ────────────────────────────────────────────────────
  LambdaCodeBucket:
    Type: String
    Description: >
      S3 bucket that holds the Lambda deployment ZIP files.
      Each ZIP must be named after its function (e.g. CreateFundUpload.zip).

  LambdaCodeKeyPrefix:
    Type: String
    Default: "lambdas/"
    Description: >
      Path prefix inside LambdaCodeBucket where Lambda ZIPs are stored.
      deploy.sh syncs dist/ to s3://<bucket>/lambdas/ so this must stay "lambdas/".

  # ── Bedrock models ──────────────────────────────────────────────────────────
  NovaModelId:
    Type: String
    Default: "amazon.nova-pro-v1:0"
    Description: >
      Bedrock model ID used by FundDocumentProcessorLambda (rules-engine flow).

  ICBedrockModelId:
    Type: String
    Default: "amazon.nova-pro-v1:0"
    Description: >
      Bedrock model ID used by ICMemoExtractionLambda (IC memo flow).

  FormCheckBedrockModelId:
    Type: String
    Default: "us.anthropic.claude-sonnet-4-6-20250514-v1:0"
    Description: >
      Bedrock model ID used by FormCheckChunkAnalyzerLambda (form completeness analysis).

  # ── S3 keys for prompt/schema assets (stored under assets/ in the platform bucket) ──
  ProcessorPromptKey:
    Type: String
    Default: "assets/prompt/rules-engine-v1.txt"
    Description: >
      S3 key for the FundDocumentProcessor (IMA) system prompt.
      The Lambda reads this as PROMPT_S3_URI = s3://<ASSETS_BUCKET>/<key>.

  IMASchemaKey:
    Type: String
    Default: "assets/RulesEngineJSONSchema.txt"
    Description: >
      S3 key for the IMA/Rules-Engine JSON schema in the platform bucket.
      S3UploadTriggerLambda uses this to construct the schemaPath in the
      SQS message it sends to ProcessingQueue for IMA documents.

  ICPromptKey:
    Type: String
    Default: "assets/prompt/icmemo-v1.txt"
    Description: S3 key for the IC Memo extraction system prompt (PROMPT_KEY).

  ICSchemaKey:
    Type: String
    Default: "assets/ICMemoEngineJSONSchema.txt"
    Description: S3 key for the IC Memo JSON schema (SCHEMA_KEY).

  # ── Misc ────────────────────────────────────────────────────────────────────
  RecordTTLDays:
    Type: Number
    Default: 30
    Description: >
      DynamoDB record TTL in days for FundInitUploadLambda. Set to 0 to disable.

  PresignExpiresSeconds:
    Type: Number
    Default: 900
    Description: Presigned S3 URL expiry in seconds (used by CreateFundUpload).

  ProcessingQueueVisibilityTimeout:
    Type: Number
    Default: 960
    Description: >
      SQS visibility timeout for the processing queue (seconds).
      Must exceed FundDocumentProcessorLambda timeout (900 s).

  ICMemoProcessingQueueVisibilityTimeout:
    Type: Number
    Default: 960
    Description: >
      SQS visibility timeout for the IC Memo processing queue (seconds).
      Must exceed FundDocumentProcessingWorkerLambda timeout (900 s).

# ══════════════════════════════════════════════════════════════════════════════
# CONDITIONS
# ══════════════════════════════════════════════════════════════════════════════

# ══════════════════════════════════════════════════════════════════════════════
# RESOURCES
# ══════════════════════════════════════════════════════════════════════════════

Resources:

  # ────────────────────────────────────────────────────────────────────────────
  # S3 — Documents bucket  (fund PDFs + extraction results + archives)
  #
  # Separate from the platform/Lambda-code bucket (created by bootstrap.yaml).
  # The platform bucket holds only lambdas/ ZIPs and assets/ prompts+schemas.
  # Everything runtime (uploaded PDFs, Bedrock output JSON, archive copies) lives here.
  # ────────────────────────────────────────────────────────────────────────────

  DocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-documents-${AWS::AccountId}"
      # CORS: required so browsers can upload PDFs via presigned PUT/POST URLs
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ["*"]
            AllowedMethods: [GET, PUT, POST, DELETE, HEAD]
            AllowedHeaders: ["*"]
            MaxAge: 3000
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          # Auto-expire non-current (archived) versions of fund documents after 90 days
          - Id: ExpireArchives
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 90
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ────────────────────────────────────────────────────────────────────────────
  # S3 — Upload bucket  (primary document intake — PDF files arrive here)
  #
  # This is the bucket that external systems (or users) upload PDFs into.
  # Folder convention:  <prefix>/<DocumentType>/<filename>.pdf
  # S3 Put events automatically invoke S3UploadTriggerLambda via the
  # NotificationConfiguration below — no manual post-deploy wiring needed.
  #
  # IMPORTANT: PermissionS3UploadTrigger must exist before this bucket so
  # CloudFormation can verify the Lambda permission during bucket creation.
  # The DependsOn below enforces this order.
  # ────────────────────────────────────────────────────────────────────────────

  UploadBucket:
    Type: AWS::S3::Bucket
    DependsOn: PermissionS3UploadTrigger
    Properties:
      BucketName: !Sub "${AWS::StackName}-uploads-${AWS::AccountId}"
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ["*"]
            AllowedMethods: [GET, PUT, POST, DELETE, HEAD]
            AllowedHeaders: ["*"]
            MaxAge: 3000
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: "s3:ObjectCreated:*"
            Function: !GetAtt S3UploadTriggerLambda.Arn
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ────────────────────────────────────────────────────────────────────────────
  # DynamoDB — Fund records table
  #   PK  : fundId  (String)
  #   GSI : status-index  →  partition key = status  (used by FundProcessingStatusLambda)
  # ────────────────────────────────────────────────────────────────────────────

  FundsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-funds"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: fundId
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: fundId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: status-index          # queried by FundProcessingStatusLambda
          KeySchema:
            - AttributeName: status
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      # TTL attribute written by FundInitUploadLambda when RECORD_TTL_DAYS > 0
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ────────────────────────────────────────────────────────────────────────────
  # SQS — Processing queue  (FundUploadCompleteLambda → FundDocumentProcessorLambda)
  # ────────────────────────────────────────────────────────────────────────────

  ProcessingQueueDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${AWS::StackName}-processing-dlq"
      MessageRetentionPeriod: 1209600  # 14 days
      Tags:
        - Key: Environment
          Value: !Ref Environment

  ProcessingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${AWS::StackName}-processing"
      # Visibility timeout must be >= Lambda timeout so in-flight messages
      # are not redelivered while the processor is still running.
      VisibilityTimeout: !Ref ProcessingQueueVisibilityTimeout
      MessageRetentionPeriod: 86400  # 1 day
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ProcessingQueueDLQ.Arn
        maxReceiveCount: 3
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ────────────────────────────────────────────────────────────────────────────
  # SQS — Success queue  (FundDocumentProcessorLambda → downstream consumers)
  # ────────────────────────────────────────────────────────────────────────────

  SuccessQueueDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${AWS::StackName}-success-dlq"
      MessageRetentionPeriod: 1209600
      Tags:
        - Key: Environment
          Value: !Ref Environment

  SuccessQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${AWS::StackName}-success"
      MessageRetentionPeriod: 86400
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt SuccessQueueDLQ.Arn
        maxReceiveCount: 3
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ────────────────────────────────────────────────────────────────────────────
  # SQS — IC Memo processing queue  (external producer → FundDocumentProcessingWorkerLambda)
  # ────────────────────────────────────────────────────────────────────────────

  ICMemoProcessingQueueDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${AWS::StackName}-icmemo-processing-dlq"
      MessageRetentionPeriod: 1209600  # 14 days
      Tags:
        - Key: Environment
          Value: !Ref Environment

  ICMemoProcessingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${AWS::StackName}-icmemo-processing"
      VisibilityTimeout: !Ref ICMemoProcessingQueueVisibilityTimeout
      MessageRetentionPeriod: 86400  # 1 day
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ICMemoProcessingQueueDLQ.Arn
        maxReceiveCount: 3
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ────────────────────────────────────────────────────────────────────────────
  # IAM — Shared execution role for all Lambda functions
  # ────────────────────────────────────────────────────────────────────────────

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # Basic execution: CloudWatch Logs
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DocumentProcessingPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:

              # ── S3 ──────────────────────────────────────────────────────────
              # Documents bucket: full CRUD for fund PDFs, results, archives.
              - Sid: S3DocumentsObjects
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:CopyObject
                  - s3:HeadObject
                Resource: !Sub "${DocumentsBucket.Arn}/*"
              - Sid: S3DocumentsBucket
                Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource: !GetAtt DocumentsBucket.Arn
              # Platform bucket (LambdaCodeBucket): read-only for prompts + schemas.
              # All Lambdas that need assets/ keys read from here.
              - Sid: S3AssetsRead
                Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub "arn:aws:s3:::${LambdaCodeBucket}/*"
              # Upload bucket: read-only for Lambda functions that read PDFs from it.
              # S3UploadTriggerLambda calls HeadObject; FundDocumentProcessingWorkerLambda
              # reads the PDF bytes directly from this bucket for ICMemo processing.
              # FundDocumentProcessorLambda reads IMA PDFs via Bedrock s3Location.
              # Using hardcoded name pattern to avoid circular dependency
              # (UploadBucket → NotificationConfig → S3UploadTriggerLambda → LambdaExecutionRole → UploadBucket).
              - Sid: S3UploadBucketRead
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:HeadObject
                Resource: !Sub "arn:aws:s3:::${AWS::StackName}-uploads-${AWS::AccountId}/*"
              - Sid: S3UploadBucketList
                Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource: !Sub "arn:aws:s3:::${AWS::StackName}-uploads-${AWS::AccountId}"

              # ── DynamoDB ─────────────────────────────────────────────────────
              - Sid: DynamoDB
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt FundsTable.Arn
                  - !Sub "${FundsTable.Arn}/index/*"
                  - !GetAtt FormCheckTable.Arn

              # ── SQS — send ───────────────────────────────────────────────────
              - Sid: SQSSend
                Effect: Allow
                Action:
                  - sqs:SendMessage
                  - sqs:GetQueueUrl
                  - sqs:GetQueueAttributes
                Resource:
                  - !GetAtt ProcessingQueue.Arn
                  - !GetAtt SuccessQueue.Arn
                  - !GetAtt ICMemoProcessingQueue.Arn
                  - !GetAtt TextractStarterQueue.Arn
                  - !GetAtt TextractResultsQueue.Arn
                  - !GetAtt FormCheckResultsQueue.Arn

              # ── SQS — receive/delete ─────────────────────────────────────────
              - Sid: SQSConsume
                Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:ChangeMessageVisibility
                  - sqs:GetQueueAttributes
                Resource:
                  - !GetAtt ProcessingQueue.Arn
                  - !GetAtt ICMemoProcessingQueue.Arn
                  - !GetAtt TextractStarterQueue.Arn
                  - !GetAtt TextractResultsQueue.Arn
                  - !GetAtt FormCheckResultsQueue.Arn

              # ── S3 — FormCheck bucket ─────────────────────────────────────────
              # Using hardcoded name pattern to avoid circular dependency
              # (FormCheckBucket → FormCheckWorkerLambda → LambdaExecutionRole → FormCheckBucket).
              - Sid: S3FormCheckBucketAccess
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:HeadObject
                Resource: !Sub "arn:aws:s3:::${AWS::StackName}-formcheck-${AWS::AccountId}/*"
              - Sid: S3FormCheckBucketList
                Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource: !Sub "arn:aws:s3:::${AWS::StackName}-formcheck-${AWS::AccountId}"

              # ── Bedrock ──────────────────────────────────────────────────────
              # FundDocumentProcessorLambda and ICMemoExtractionLambda both call Converse API.
              # FundDocumentProcessorLambda also passes S3 document URIs; Bedrock reads
              # those objects using the caller's credentials, so s3:GetObject above covers it.
              - Sid: Bedrock
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: "*"

              - Sid: BedrockMarketplace
                Effect: Allow
                Action:
                  - aws-marketplace:Subscribe
                  - aws-marketplace:Unsubscribe
                  - aws-marketplace:ViewSubscriptions
                Resource: "*"

              # ── Textract ─────────────────────────────────────────────────────
              - Sid: Textract
                Effect: Allow
                Action:
                  - textract:DetectDocumentText
                  - textract:AnalyzeDocument
                  - textract:StartDocumentTextDetection
                  - textract:GetDocumentTextDetection
                  - textract:StartDocumentAnalysis
                  - textract:GetDocumentAnalysis
                Resource: "*"
              # Allow TextractStarterLambda to pass TextractSNSRole to Textract
              - Sid: PassTextractSNSRole
                Effect: Allow
                Action: iam:PassRole
                Resource: !GetAtt TextractSNSRole.Arn
                Condition:
                  StringEquals:
                    iam:PassedToService: textract.amazonaws.com

              # ── Step Functions — FormCheck state machine ─────────────────────
              # FormCheckResultsWorkerLambda calls StartExecution on the FormCheck
              # state machine after extracting Textract fields.
              # Using name-pattern ARN (not !GetAtt) to avoid circular dependency:
              #   LambdaExecutionRole → FormCheckStateMachine → ChunkAnalyzerLambda → LambdaExecutionRole
              - Sid: StepFunctionsFormCheck
                Effect: Allow
                Action:
                  - states:StartExecution
                Resource: !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:${AWS::StackName}-formcheck-analyzer"

  # ────────────────────────────────────────────────────────────────────────────
  # CloudWatch Log Groups (explicit, with retention)
  # ────────────────────────────────────────────────────────────────────────────

  # ────────────────────────────────────────────────────────────────────────────
  # FormCheck — dedicated infrastructure (independent from funds pipeline)
  # ────────────────────────────────────────────────────────────────────────────

  FormCheckTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-formcheck"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: jobId
          AttributeType: S
      KeySchema:
        - AttributeName: jobId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # SNS topic for Textract to publish FormCheck completion notifications
  FormCheckTextractTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${AWS::StackName}-formcheck-textract"

  # DLQ + main queue for FormCheck Textract results
  FormCheckResultsDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${AWS::StackName}-formcheck-results-dlq"
      MessageRetentionPeriod: 1209600
      Tags:
        - Key: Environment
          Value: !Ref Environment

  FormCheckResultsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${AWS::StackName}-formcheck-results"
      VisibilityTimeout: 960
      MessageRetentionPeriod: 86400
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt FormCheckResultsDLQ.Arn
        maxReceiveCount: 3
      Tags:
        - Key: Environment
          Value: !Ref Environment

  FormCheckResultsQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref FormCheckResultsQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt FormCheckResultsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref FormCheckTextractTopic

  FormCheckResultsQueueSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref FormCheckTextractTopic
      Protocol: sqs
      Endpoint: !GetAtt FormCheckResultsQueue.Arn

  # S3 bucket dedicated to FormCheck uploads (separate from UploadBucket to avoid
  # S3 notification filter overlap with S3UploadTriggerLambda)
  # Must DependsOn PermissionFormCheckWorker so the bucket can reference the Lambda ARN
  FormCheckBucket:
    Type: AWS::S3::Bucket
    DependsOn: PermissionFormCheckWorker
    Properties:
      BucketName: !Sub "${AWS::StackName}-formcheck-${AWS::AccountId}"
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ["*"]
            AllowedMethods: [GET, PUT, POST, DELETE, HEAD]
            AllowedHeaders: ["*"]
            MaxAge: 3000
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: "s3:ObjectCreated:*"
            Function: !GetAtt FormCheckWorkerLambda.Arn
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ── FormCheck Step Functions (parallel chunk analysis) ───────────────────────

  # IAM role for the Step Functions state machine to invoke ChunkAnalyzer + Aggregator Lambdas
  FormCheckSFNRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-formcheck-sfn-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource:
                  - !GetAtt FormCheckChunkAnalyzerLambda.Arn
                  - !GetAtt FormCheckAggregatorLambda.Arn
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # State machine:
  #   Map state — fans out to N parallel FormCheckChunkAnalyzerLambda invocations
  #   (one per 5-page chunk, with boundary-extension already embedded in the ranges)
  #   then calls FormCheckAggregatorLambda to merge results and write SUCCEEDED to DDB.
  FormCheckStateMachine:
    Type: AWS::StepFunctions::StateMachine
    DependsOn:
      - FormCheckChunkAnalyzerLambda
      - FormCheckAggregatorLambda
    Properties:
      StateMachineName: !Sub "${AWS::StackName}-formcheck-analyzer"
      RoleArn: !GetAtt FormCheckSFNRole.Arn
      StateMachineType: EXPRESS
      DefinitionString: !Sub |
        {
          "Comment": "FormCheck parallel Bedrock chunk analysis",
          "StartAt": "AnalyzeChunks",
          "States": {
            "AnalyzeChunks": {
              "Type": "Map",
              "ItemsPath": "$.chunks",
              "ItemSelector": {
                "jobId.$": "$.jobId",
                "fieldsS3Key.$": "$.fieldsS3Key",
                "totalFields.$": "$.totalFields",
                "startPage.$": "$$.Map.Item.Value.startPage",
                "endPage.$": "$$.Map.Item.Value.endPage"
              },
              "MaxConcurrency": 10,
              "ItemProcessor": {
                "ProcessorConfig": {
                  "Mode": "INLINE"
                },
                "StartAt": "AnalyzeOneChunk",
                "States": {
                  "AnalyzeOneChunk": {
                    "Type": "Task",
                    "Resource": "arn:aws:states:::lambda:invoke",
                    "Parameters": {
                      "FunctionName": "${FormCheckChunkAnalyzerLambda.Arn}",
                      "Payload.$": "$"
                    },
                    "ResultSelector": {
                      "incompleteSections.$": "$.Payload.incompleteSections"
                    },
                    "Retry": [
                      {
                        "ErrorEquals": [
                          "States.TaskFailed",
                          "Lambda.ServiceException",
                          "Lambda.AWSLambdaException",
                          "Lambda.SdkClientException"
                        ],
                        "IntervalSeconds": 5,
                        "MaxAttempts": 2,
                        "BackoffRate": 2
                      }
                    ],
                    "End": true
                  }
                }
              },
              "ResultPath": "$.chunkResults",
              "Next": "AggregateResults"
            },
            "AggregateResults": {
              "Type": "Task",
              "Resource": "arn:aws:states:::lambda:invoke",
              "Parameters": {
                "FunctionName": "${FormCheckAggregatorLambda.Arn}",
                "Payload": {
                  "jobId.$": "$.jobId",
                  "chunkResults.$": "$.chunkResults"
                }
              },
              "ResultPath": null,
              "End": true
            }
          }
        }
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ── FormCheck CloudWatch Log Groups ───────────────────────────────────────────

  LogGroupFormCheckInit:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-form-check-init"
      RetentionInDays: 14

  LogGroupFormCheckWorker:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-form-check-worker"
      RetentionInDays: 30

  LogGroupFormCheckResultsWorker:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-form-check-results-worker"
      RetentionInDays: 30

  LogGroupFormCheckStatus:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-form-check-status"
      RetentionInDays: 14

  LogGroupFormCheckChunkAnalyzer:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-form-check-chunk-analyzer"
      RetentionInDays: 30

  LogGroupFormCheckAggregator:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-form-check-aggregator"
      RetentionInDays: 30

  LogGroupInitDocumentUpload:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-init-document-upload"
      RetentionInDays: 14

  # DEPRECATED — superseded by InitDocumentUploadLambda (POST /funds/upload/init)
  LogGroupCreateFundUpload:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-create-fund-upload"
      RetentionInDays: 14

  LogGroupFundInitUpload:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-fund-init-upload"
      RetentionInDays: 14

  LogGroupFundDocumentUpload:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-fund-document-upload"
      RetentionInDays: 14

  LogGroupFundUploadComplete:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-fund-upload-complete"
      RetentionInDays: 14

  LogGroupFundDocumentProcessor:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-fund-document-processor"
      RetentionInDays: 30  # longer — Bedrock jobs are expensive to re-run

  LogGroupFundProcessingStatus:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-fund-processing-status"
      RetentionInDays: 14

  LogGroupFundGetById:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-fund-get-by-id"
      RetentionInDays: 14

  LogGroupICMemoExtraction:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-ic-memo-extraction"
      RetentionInDays: 30

  LogGroupFundDocumentProcessingWorker:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-fund-document-processing-worker"
      RetentionInDays: 30

  # ── Async Textract pipeline ───────────────────────────────────────────────
  # SNS topic Textract publishes to when async jobs complete.
  TextractCompletionTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${AWS::StackName}-textract-completion"
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # IAM role that Textract assumes to publish SNS notifications and write raw output to S3.
  TextractSNSRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-textract-sns-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: textract.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: TextractSNSPublishPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: sns:Publish
                Resource:
                  - !Ref TextractCompletionTopic
                  - !Ref FormCheckTextractTopic
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub "${DocumentsBucket.Arn}/textract/*"

  # TextractStarterQueue: s3UploadTrigger → textractStarterLambda
  TextractStarterDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${AWS::StackName}-textract-starter-dlq"
      MessageRetentionPeriod: 1209600
      Tags:
        - Key: Environment
          Value: !Ref Environment

  TextractStarterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${AWS::StackName}-textract-starter"
      VisibilityTimeout: 120
      MessageRetentionPeriod: 86400
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt TextractStarterDLQ.Arn
        maxReceiveCount: 3
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # TextractResultsQueue: TextractCompletionTopic (SNS) → textractResultsWorkerLambda
  TextractResultsDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${AWS::StackName}-textract-results-dlq"
      MessageRetentionPeriod: 1209600
      Tags:
        - Key: Environment
          Value: !Ref Environment

  TextractResultsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${AWS::StackName}-textract-results"
      VisibilityTimeout: 960
      MessageRetentionPeriod: 86400
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt TextractResultsDLQ.Arn
        maxReceiveCount: 3
      Tags:
        - Key: Environment
          Value: !Ref Environment

  TextractResultsQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref TextractResultsQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt TextractResultsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref TextractCompletionTopic

  TextractResultsQueueSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref TextractCompletionTopic
      Protocol: sqs
      Endpoint: !GetAtt TextractResultsQueue.Arn

  LogGroupTextractStarter:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-textract-starter"
      RetentionInDays: 30

  LogGroupTextractResultsWorker:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-textract-results-worker"
      RetentionInDays: 30

  LogGroupS3UploadTrigger:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-s3-upload-trigger"
      RetentionInDays: 14

  LogGroupExternalFundCreate:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-external-fund-create"
      RetentionInDays: 14

  # ────────────────────────────────────────────────────────────────────────────
  # Lambda Functions
  # ────────────────────────────────────────────────────────────────────────────

  # 1. InitDocumentUpload
  #    Unified REST upload init — supports ICMemo and IMA document types.
  #    Creates a fund record in DDB and returns a presigned S3 PUT URL whose
  #    key path (uploads/<DocType>/<fundId>/<fileName>) is recognised by
  #    S3UploadTriggerLambda, so the S3 trigger pipeline runs automatically
  #    after the client uploads the PDF.
  #    Trigger: POST /funds/upload/init?documentType=icmemo|ima&fundName=...
  #    Env vars: DDB_TABLE, DOC_BUCKET, PRESIGN_EXPIRES_SECONDS
  InitDocumentUploadLambda:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupInitDocumentUpload
    Properties:
      FunctionName: !Sub "${AWS::StackName}-init-document-upload"
      Description: >
        Unified ICMemo/IMA upload init: creates a fund record in DynamoDB and
        returns a presigned S3 PUT URL. The S3 key includes the document type
        folder so S3UploadTriggerLambda routes it through the Textract pipeline.
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Sub "${LambdaCodeKeyPrefix}initDocumentUpload.zip"
      Environment:
        Variables:
          DDB_TABLE:               !Ref FundsTable
          DOC_BUCKET:              !Ref UploadBucket
          PRESIGN_EXPIRES_SECONDS: !Ref PresignExpiresSeconds
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # DEPRECATED — superseded by InitDocumentUploadLambda (POST /funds/upload/init)
  # 2. CreateFundUpload
  #    IC Memo flow — step 1: create fund record in DDB + return presigned PUT URL
  #    Trigger: POST /funds
  #    Env vars: DDB_TABLE, DOC_BUCKET, PRESIGN_EXPIRES_SECONDS
  CreateFundUploadLambda:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupCreateFundUpload
    Properties:
      FunctionName: !Sub "${AWS::StackName}-create-fund-upload"
      Description: >
        IC Memo flow step 1: creates a fund record in DynamoDB and returns
        a presigned S3 PUT URL for the client to upload a PDF.
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Sub "${LambdaCodeKeyPrefix}createFundUpload.zip"
      Environment:
        Variables:
          DDB_TABLE:               !Ref FundsTable
          DOC_BUCKET:              !Ref DocumentsBucket
          PRESIGN_EXPIRES_SECONDS: !Ref PresignExpiresSeconds
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # 2. FundInitUpload
  #    Rules Engine flow — step 1: init fund, archive previous files, return presigned POST URL
  #    Trigger: POST /funds/{fundId}/init
  #    Env vars: DOCUMENTS_BUCKET, DDB_TABLE_NAME, RECORD_TTL_DAYS
  FundInitUploadLambda:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupFundInitUpload
    Properties:
      FunctionName: !Sub "${AWS::StackName}-fund-init-upload"
      Description: >
        Rules Engine flow step 1: initialises a fund upload session.
        Archives any previous files and returns a presigned POST URL.
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60
      MemorySize: 256
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Sub "${LambdaCodeKeyPrefix}fundInitUpload.zip"
      Environment:
        Variables:
          DOCUMENTS_BUCKET: !Ref DocumentsBucket
          ASSETS_BUCKET:    !Ref LambdaCodeBucket
          DDB_TABLE_NAME:   !Ref FundsTable
          RECORD_TTL_DAYS:  !Ref RecordTTLDays
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # 3. FundDocumentUpload
  #    Rules Engine flow — step 2 (alternative to presigned POST): upload base64 docs
  #    Trigger: POST /funds/{fundId}/upload
  #    Env vars: DOCUMENTS_BUCKET, DYNAMODB_TABLE
  FundDocumentUploadLambda:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupFundDocumentUpload
    Properties:
      FunctionName: !Sub "${AWS::StackName}-fund-document-upload"
      Description: >
        Accepts base64-encoded fund documents in the request body and
        writes them to S3 under {fundId}/files/.
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60
      MemorySize: 512  # larger for base64 decode of PDFs
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Sub "${LambdaCodeKeyPrefix}fundDocumentUpload.zip"
      Environment:
        Variables:
          DOCUMENTS_BUCKET: !Ref DocumentsBucket
          DYNAMODB_TABLE:   !Ref FundsTable
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # 4. FundUploadComplete
  #    Rules Engine flow — step 3: signal upload done → WRITES message to ProcessingQueue
  #    Trigger: POST /funds/{fundId}/complete
  #    Env vars: DYNAMODB_TABLE, BUCKET_NAME, SQS_QUEUE_URL
  FundUploadCompleteLambda:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupFundUploadComplete
    Properties:
      FunctionName: !Sub "${AWS::StackName}-fund-upload-complete"
      Description: >
        Verifies uploaded files in S3, updates DynamoDB status to UPLOADED,
        and enqueues a processing job to the SQS processing queue.
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Sub "${LambdaCodeKeyPrefix}fundUploadComplete.zip"
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref FundsTable
          BUCKET_NAME:    !Ref DocumentsBucket
          ASSETS_BUCKET:  !Ref LambdaCodeBucket
          SQS_QUEUE_URL:  !Ref ProcessingQueue  # <── WRITES to this queue
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # 5. FundDocumentProcessor
  #    Rules Engine flow — step 4: SQS consumer — Bedrock inference → S3 result → SuccessQueue
  #    Trigger: SQS (ProcessingQueue) — see EventSourceMapping below
  #    Env vars: NOVA_MODEL_ID, PROMPT_S3_URI, DDB_TABLE_NAME, SUCCESS_QUEUE_URL
  FundDocumentProcessorLambda:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupFundDocumentProcessor
    Properties:
      FunctionName: !Sub "${AWS::StackName}-fund-document-processor"
      Description: >
        SQS consumer: reads fund documents from S3, calls Bedrock (Nova) for
        rules-engine extraction, writes result JSON to S3, updates DynamoDB,
        and sends a success notification to SuccessQueue.
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 900      # Maximum Lambda timeout — Bedrock calls can be slow
      MemorySize: 1024  # Large for multi-document Bedrock payloads
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Sub "${LambdaCodeKeyPrefix}fundDocumentProcessor.zip"
      Environment:
        Variables:
          NOVA_MODEL_ID: !Ref NovaModelId
          PROMPT_S3_URI: !Sub "s3://${LambdaCodeBucket}/${ProcessorPromptKey}"
          DDB_TABLE_NAME: !Ref FundsTable
          SUCCESS_QUEUE_URL: !Ref SuccessQueue  # <── WRITES to this queue
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # SQS trigger for FundDocumentProcessorLambda
  # BatchSize=1: each SQS message is one fund job — process independently.
  # ReportBatchItemFailures: partial batch success so only failed messages go to DLQ.
  FundDocumentProcessorEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt ProcessingQueue.Arn
      FunctionName: !GetAtt FundDocumentProcessorLambda.Arn
      BatchSize: 1
      FunctionResponseTypes:
        - ReportBatchItemFailures
      MaximumBatchingWindowInSeconds: 0
      # Automatically enabled
      Enabled: true

  # 6. FundProcessingStatus
  #    Read API — list all funds (optionally filtered by status via GSI)
  #    Trigger: GET /funds
  #    Env vars: DDB_TABLE_NAME
  FundProcessingStatusLambda:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupFundProcessingStatus
    Properties:
      FunctionName: !Sub "${AWS::StackName}-fund-processing-status"
      Description: >
        Returns a paginated list of fund records. Accepts optional ?status=
        query param to filter via the status-index GSI.
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Sub "${LambdaCodeKeyPrefix}fundProcessingStatus.zip"
      Environment:
        Variables:
          DDB_TABLE_NAME: !Ref FundsTable
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # 7. FundGetById
  #    Read API — get single fund by fundId
  #    Trigger: GET /funds/{fundId}
  #    Env vars: DYNAMODB_TABLE
  FundGetByIdLambda:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupFundGetById
    Properties:
      FunctionName: !Sub "${AWS::StackName}-fund-get-by-id"
      Description: Returns a single fund record looked up by fundId.
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 15
      MemorySize: 256
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Sub "${LambdaCodeKeyPrefix}fundGetById.zip"
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref FundsTable
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # 8. ICMemoExtraction
  #    IC Memo flow — step 2: Textract OCR on PDF → Bedrock extraction → DDB
  #    Trigger: POST /funds/{fundId}/extract
  #    Env vars: DOC_BUCKET, PROMPT_KEY, SCHEMA_KEY, BEDROCK_MODEL_ID, DDB_TABLE
  ICMemoExtractionLambda:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupICMemoExtraction
    Properties:
      FunctionName: !Sub "${AWS::StackName}-ic-memo-extraction"
      Description: >
        IC Memo flow step 2: reads the uploaded PDF via Textract (OCR),
        passes text to Bedrock with a JSON schema, and stores extracted
        structured data in DynamoDB.
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300  # Textract + Bedrock can take a couple of minutes
      MemorySize: 512
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Sub "${LambdaCodeKeyPrefix}icMemoExtraction.zip"
      Environment:
        Variables:
          DOC_BUCKET:       !Ref DocumentsBucket
          ASSETS_BUCKET:    !Ref LambdaCodeBucket
          PROMPT_KEY:       !Ref ICPromptKey
          SCHEMA_KEY:       !Ref ICSchemaKey
          BEDROCK_MODEL_ID: !Ref ICBedrockModelId
          DDB_TABLE:        !Ref FundsTable
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # 9. FundDocumentProcessingWorker
  #    IC Memo flow — SQS consumer: Textract OCR + Bedrock extraction → DynamoDB + S3
  #    Trigger: SQS (ICMemoProcessingQueue) — see EventSourceMapping below
  #    Env vars: DDB_TABLE, DOC_BUCKET, PROMPT_KEY, SCHEMA_KEY, BEDROCK_MODEL_ID
  #
  #    Expected SQS message:
  #      { "fundId": "...", "documentType": "icmemo",
  #        "bucket": "<upload-bucket>", "key": "<object-key>",
  #        "fileName": "...",           // optional
  #        "promptKey": "...",          // optional per-message override
  #        "schemaKey": "..."           // optional per-message override
  #      }
  FundDocumentProcessingWorkerLambda:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupFundDocumentProcessingWorker
    Properties:
      FunctionName: !Sub "${AWS::StackName}-fund-document-processing-worker"
      Description: >
        SQS consumer for the IC Memo flow: reads uploaded PDF from S3, runs
        Textract OCR, calls Bedrock (Nova) with a JSON schema, validates output
        with AJV, writes result JSON to S3, and updates DynamoDB status.
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 900      # Maximum Lambda timeout — Textract + Bedrock can be slow
      MemorySize: 512
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Sub "${LambdaCodeKeyPrefix}fundDocumentProcessingWorker.zip"
      Environment:
        Variables:
          DDB_TABLE:        !Ref FundsTable
          DOC_BUCKET:       !Ref DocumentsBucket
          ASSETS_BUCKET:    !Ref LambdaCodeBucket
          PROMPT_KEY:       !Ref ICPromptKey
          SCHEMA_KEY:       !Ref ICSchemaKey
          BEDROCK_MODEL_ID: !Ref ICBedrockModelId
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # SQS trigger for FundDocumentProcessingWorkerLambda
  # BatchSize=1: each message is one document job — process independently.
  # ReportBatchItemFailures: partial batch success so only failed messages go to DLQ.
  FundDocumentProcessingWorkerEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt ICMemoProcessingQueue.Arn
      FunctionName: !GetAtt FundDocumentProcessingWorkerLambda.Arn
      BatchSize: 1
      FunctionResponseTypes:
        - ReportBatchItemFailures
      MaximumBatchingWindowInSeconds: 0
      Enabled: true

  # 10. S3UploadTrigger
  #     Universal S3 event bridge: S3 Put on UploadBucket → routing based on document type.
  #     Trigger: S3 Put event — UploadBucket NotificationConfiguration wired in this stack.
  #     Env vars: DDB_TABLE, IC_MEMO_QUEUE_URL, PROCESSING_QUEUE_URL, ASSETS_BUCKET, DOC_BUCKET, IMA_SCHEMA_KEY
  #
  #     S3 key convention:  <prefix>/<DocumentType>/<filename>.pdf
  #     Metadata expected (all docs):    x-amz-meta-fund-name = <fund name>
  #     Metadata expected (non-ICMemo):  x-amz-meta-fund-id   = <existing fundId>
  #
  #     Routing:
  #       ICMemo          → create new INT#<uuid> DDB record → ICMemoProcessingQueue
  #                         (→ FundDocumentProcessingWorkerLambda)
  #       IMA             → update existing fund DDB record  → ProcessingQueue
  #                         (→ FundDocumentProcessorLambda)
  #       PPM / LPA /
  #       SideLetter /
  #       FundStructure /
  #       SubDoc          → update existing fund DDB record  → no queue (no AI processing yet)
  S3UploadTriggerLambda:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupS3UploadTrigger
    Properties:
      FunctionName: !Sub "${AWS::StackName}-s3-upload-trigger"
      Description: >
        Routes PDF uploads by document type. ICMemo creates a new fund record.
        All document types are enqueued to TextractStarterQueue for async Textract processing.
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Sub "${LambdaCodeKeyPrefix}s3UploadTrigger.zip"
      Environment:
        Variables:
          DDB_TABLE:                   !Ref FundsTable
          TEXTRACT_STARTER_QUEUE_URL:  !Ref TextractStarterQueue
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # Allow the managed UploadBucket to invoke S3UploadTriggerLambda.
  # Must be created BEFORE UploadBucket (UploadBucket DependsOn this resource)
  # so CloudFormation can verify the permission when setting up the notification.
  # Using hardcoded bucket name pattern to avoid a circular dependency between
  # UploadBucket (NotificationConfig → Lambda ARN) and LambdaExecutionRole
  # (IAM policy → Bucket ARN).
  PermissionS3UploadTrigger:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref S3UploadTriggerLambda
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !Sub "arn:aws:s3:::${AWS::StackName}-uploads-${AWS::AccountId}"

  # 11. TextractStarterLambda
  #     Async Textract pipeline — step 1: start async Textract job for any document type.
  #     Trigger: TextractStarterQueue (SQS)
  #     Env vars: DDB_TABLE, TEXTRACT_SNS_TOPIC_ARN, TEXTRACT_SNS_ROLE_ARN, DOC_BUCKET
  TextractStarterLambda:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupTextractStarter
    Properties:
      FunctionName: !Sub "${AWS::StackName}-textract-starter"
      Description: >
        Starts an async Textract job for any document type.
        JobTag carries fundId|documentType so the results worker can identify the document.
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60
      MemorySize: 256
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Sub "${LambdaCodeKeyPrefix}textractStarterLambda.zip"
      Environment:
        Variables:
          DDB_TABLE:               !Ref FundsTable
          TEXTRACT_SNS_TOPIC_ARN:  !Ref TextractCompletionTopic
          TEXTRACT_SNS_ROLE_ARN:   !GetAtt TextractSNSRole.Arn
          DOC_BUCKET:              !Ref DocumentsBucket
      Tags:
        - Key: Environment
          Value: !Ref Environment

  TextractStarterEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt TextractStarterQueue.Arn
      FunctionName: !GetAtt TextractStarterLambda.Arn
      BatchSize: 1
      FunctionResponseTypes:
        - ReportBatchItemFailures
      MaximumBatchingWindowInSeconds: 0
      Enabled: true

  # 12. TextractResultsWorkerLambda
  #     Async Textract pipeline — step 2: receive Textract completion via SNS→SQS,
  #     paginate results, run Bedrock, write result JSON, update DynamoDB.
  #     Trigger: TextractResultsQueue (SQS, subscribed to TextractCompletionTopic SNS)
  TextractResultsWorkerLambda:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupTextractResultsWorker
    Properties:
      FunctionName: !Sub "${AWS::StackName}-textract-results-worker"
      Description: >
        Receives Textract async completion notifications (SNS→SQS), paginates
        GetDocumentTextDetection, runs Bedrock Converse, writes result JSON to S3,
        updates DynamoDB to SUCCEEDED. Handles all document types.
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 900
      MemorySize: 512
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Sub "${LambdaCodeKeyPrefix}textractResultsWorkerLambda.zip"
      Environment:
        Variables:
          NOVA_MODEL_ID:              !Ref NovaModelId
          ICMEMO_PROMPT_S3_URI:       !Sub "s3://${LambdaCodeBucket}/${ICPromptKey}"
          ICMEMO_SCHEMA_S3_URI:       !Sub "s3://${LambdaCodeBucket}/${ICSchemaKey}"
          RULES_ENGINE_PROMPT_S3_URI: !Sub "s3://${LambdaCodeBucket}/${ProcessorPromptKey}"
          RULES_ENGINE_SCHEMA_S3_URI: !Sub "s3://${LambdaCodeBucket}/${IMASchemaKey}"
          DDB_TABLE:                  !Ref FundsTable
          SUCCESS_QUEUE_URL:          !Ref SuccessQueue
          DOC_BUCKET:                 !Ref DocumentsBucket
      Tags:
        - Key: Environment
          Value: !Ref Environment

  TextractResultsWorkerEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt TextractResultsQueue.Arn
      FunctionName: !GetAtt TextractResultsWorkerLambda.Arn
      BatchSize: 1
      FunctionResponseTypes:
        - ReportBatchItemFailures
      MaximumBatchingWindowInSeconds: 0
      Enabled: true

  # 13. ExternalFundCreate
  #     Future external API — accepts fund ID + fund name from a third party,
  #     stores as EXT#<fundId>, returns a presigned PUT URL for document upload.
  #     Trigger: POST /funds/register
  #     Env vars: DDB_TABLE, DOC_BUCKET, PRESIGN_EXPIRES_SECONDS
  ExternalFundCreateLambda:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupExternalFundCreate
    Properties:
      FunctionName: !Sub "${AWS::StackName}-external-fund-create"
      Description: >
        External API: accepts a third-party fund ID and fund name, stores the
        record with an EXT# prefix, and returns a presigned S3 PUT URL so the
        caller can upload the IC Memo PDF directly.
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Sub "${LambdaCodeKeyPrefix}externalFundCreate.zip"
      Environment:
        Variables:
          DDB_TABLE:               !Ref FundsTable
          DOC_BUCKET:              !Ref DocumentsBucket
          PRESIGN_EXPIRES_SECONDS: !Ref PresignExpiresSeconds
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ── FormCheck Lambda Functions ────────────────────────────────────────────────
  #
  # Independent form-completeness validation pipeline:
  #   POST /formcheck/init    → FormCheckInitLambda
  #   GET  /formcheck/{jobId} → FormCheckStatusLambda
  #   S3 ObjectCreated (FormCheckBucket) → FormCheckWorkerLambda
  #   FormCheckResultsQueue (SNS→SQS)    → FormCheckResultsWorkerLambda
  #
  # FormCheckInitLambda
  #   Creates FCHK#<uuid> record in FormCheckTable and returns presigned PUT URL
  #   for the caller to upload the PDF directly to FormCheckBucket.
  FormCheckInitLambda:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupFormCheckInit
    Properties:
      FunctionName: !Sub "${AWS::StackName}-form-check-init"
      Description: >
        POST /formcheck/init — creates a FormCheck job record and returns a
        presigned S3 PUT URL so the caller can upload a PDF for form completeness checking.
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Sub "${LambdaCodeKeyPrefix}formCheckInit.zip"
      Environment:
        Variables:
          FORM_CHECK_TABLE:        !Ref FormCheckTable
          FORM_CHECK_BUCKET:       !Ref FormCheckBucket
          PRESIGN_EXPIRES_SECONDS: !Ref PresignExpiresSeconds
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # FormCheckWorkerLambda
  #   S3 trigger on FormCheckBucket — starts async Textract FORMS+TABLES analysis job.
  FormCheckWorkerLambda:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupFormCheckWorker
    Properties:
      FunctionName: !Sub "${AWS::StackName}-form-check-worker"
      Description: >
        S3 trigger (FormCheckBucket) — starts Textract StartDocumentAnalysis with
        FORMS+TABLES feature types and updates job status to TEXTRACT_PROCESSING.
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60
      MemorySize: 256
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Sub "${LambdaCodeKeyPrefix}formCheckWorker.zip"
      Environment:
        Variables:
          FORM_CHECK_TABLE:        !Ref FormCheckTable
          TEXTRACT_SNS_TOPIC_ARN:  !Ref FormCheckTextractTopic
          TEXTRACT_SNS_ROLE_ARN:   !GetAtt TextractSNSRole.Arn
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # FormCheckResultsWorkerLambda
  #   SQS trigger (FormCheckResultsQueue) — paginates GetDocumentAnalysis, extracts
  #   form fields, writes fields.json to S3, then starts FormCheckStateMachine.
  FormCheckResultsWorkerLambda:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupFormCheckResultsWorker
    Properties:
      FunctionName: !Sub "${AWS::StackName}-form-check-results-worker"
      Description: >
        SQS consumer (FormCheckResultsQueue) — paginates Textract FORMS results,
        extracts form fields, writes fields.json to S3, then starts the
        FormCheckStateMachine (Map state) for parallel Bedrock chunk analysis.
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      MemorySize: 512
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Sub "${LambdaCodeKeyPrefix}formCheckResultsWorker.zip"
      Environment:
        Variables:
          FORM_CHECK_TABLE:    !Ref FormCheckTable
          FORM_CHECK_BUCKET:   !Ref FormCheckBucket
          FORM_CHECK_SFN_ARN:  !GetAtt FormCheckStateMachine.Arn
      Tags:
        - Key: Environment
          Value: !Ref Environment

  FormCheckResultsWorkerEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt FormCheckResultsQueue.Arn
      FunctionName:   !GetAtt FormCheckResultsWorkerLambda.Arn
      BatchSize: 1
      FunctionResponseTypes:
        - ReportBatchItemFailures
      MaximumBatchingWindowInSeconds: 0
      Enabled: true

  # FormCheckStatusLambda
  #   GET /formcheck/{jobId} — returns current job status and result from FormCheckTable.
  FormCheckStatusLambda:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupFormCheckStatus
    Properties:
      FunctionName: !Sub "${AWS::StackName}-form-check-status"
      Description: >
        GET /formcheck/{jobId} — returns the current status and analysis result of
        a form completeness check job.
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 15
      MemorySize: 128
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Sub "${LambdaCodeKeyPrefix}formCheckStatus.zip"
      Environment:
        Variables:
          FORM_CHECK_TABLE: !Ref FormCheckTable
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # FormCheckChunkAnalyzerLambda
  #   Step Functions Map task — reads fields.json from S3 for its assigned page range,
  #   filters to incomplete fields only, calls Bedrock, returns incompleteSections[].
  FormCheckChunkAnalyzerLambda:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupFormCheckChunkAnalyzer
    Properties:
      FunctionName: !Sub "${AWS::StackName}-form-check-chunk-analyzer"
      Description: >
        Step Functions Map task — reads a page-range slice of form fields from S3,
        calls Bedrock to identify incomplete sections, returns incompleteSections[].
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      MemorySize: 256
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Sub "${LambdaCodeKeyPrefix}formCheckChunkAnalyzer.zip"
      Environment:
        Variables:
          FORM_CHECK_BUCKET: !Ref FormCheckBucket
          BEDROCK_MODEL_ID:  !Ref FormCheckBedrockModelId
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # FormCheckAggregatorLambda
  #   Step Functions final task — receives all chunk results from the Map state,
  #   deduplicates incomplete sections, writes SUCCEEDED to DynamoDB.
  FormCheckAggregatorLambda:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupFormCheckAggregator
    Properties:
      FunctionName: !Sub "${AWS::StackName}-form-check-aggregator"
      Description: >
        Step Functions aggregator — merges incompleteSections arrays from all
        chunk analyzers, deduplicates by title, writes final result to DynamoDB.
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Sub "${LambdaCodeKeyPrefix}formCheckAggregator.zip"
      Environment:
        Variables:
          FORM_CHECK_TABLE: !Ref FormCheckTable
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ─── S3 permission: allow FormCheckBucket to invoke FormCheckWorkerLambda ────
  # Must be created BEFORE FormCheckBucket (FormCheckBucket DependsOn this resource)
  PermissionFormCheckWorker:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref FormCheckWorkerLambda
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !Sub "arn:aws:s3:::${AWS::StackName}-formcheck-${AWS::AccountId}"

