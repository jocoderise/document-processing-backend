              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ""
      MethodResponses:
        - StatusCode: "200"
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: false
            method.response.header.Access-Control-Allow-Methods: false
            method.response.header.Access-Control-Allow-Origin: false

  # ── Deployment & Stage ───────────────────────────────────────────────────────
  # Deployment must depend on every Method so all routes are included.

  RestApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - MethodFundsPOST
      - MethodFundsGET
      - MethodFundsOPTIONS
      - MethodFundIdGET
      - MethodFundIdOPTIONS
      - MethodFundInitPOST
      - MethodFundInitOPTIONS
      - MethodFundUploadPOST
      - MethodFundUploadOPTIONS
      - MethodFundCompletePOST
      - MethodFundCompleteOPTIONS
      - MethodFundExtractPOST
      - MethodFundExtractOPTIONS
      - MethodFundRegisterPOST
      - MethodFundRegisterOPTIONS
      - MethodFundsUploadInitPOST
      - MethodFundsUploadInitOPTIONS
      - MethodFormCheckInitPOST
      - MethodFormCheckInitOPTIONS
      - MethodFormCheckJobIdGET
      - MethodFormCheckJobIdOPTIONS
    Properties:
      RestApiId: !Ref RestApi
      # Changing Description forces CloudFormation to create a NEW deployment,
      # which is required for newly added routes to appear in the stage.
      # Bump this value whenever new API methods are added.
      Description: "formcheck-routes-v1"

  RestApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref RestApi
      DeploymentId: !Ref RestApiDeployment
      StageName: !Ref Environment
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          ThrottlingBurstLimit: 100
          ThrottlingRateLimit: 50

  # ── Lambda permissions for API Gateway ───────────────────────────────────────

  PermissionInitDocumentUpload:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref InitDocumentUploadLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*/*"

  # DEPRECATED — superseded by PermissionInitDocumentUpload
  PermissionCreateFundUpload:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CreateFundUploadLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*/*"

  PermissionFundInitUpload:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref FundInitUploadLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*/*"

  PermissionFundDocumentUpload:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref FundDocumentUploadLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*/*"

  PermissionFundUploadComplete:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref FundUploadCompleteLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*/*"

  PermissionFundProcessingStatus:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref FundProcessingStatusLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*/*"

  PermissionFundGetById:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref FundGetByIdLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*/*"

  PermissionICMemoExtraction:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ICMemoExtractionLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*/*"

  PermissionExternalFundCreate:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ExternalFundCreateLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*/*"

  PermissionFormCheckInit:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref FormCheckInitLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*/*"

  PermissionFormCheckStatus:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref FormCheckStatusLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*/*"

# ══════════════════════════════════════════════════════════════════════════════
# OUTPUTS
# ══════════════════════════════════════════════════════════════════════════════

Outputs:

  ApiEndpoint:
    Description: REST API base URL — append route paths (e.g. /funds) to call the API.
    Value: !Sub "https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"
    Export:
      Name: !Sub "${AWS::StackName}-api-endpoint"

  PlatformBucketName:
    Description: >
      Platform S3 bucket (created by bootstrap.yaml).
      lambdas/ — Lambda ZIPs   assets/ — prompts, schemas
    Value: !Ref LambdaCodeBucket
    Export:
      Name: !Sub "${AWS::StackName}-platform-bucket"

  DocumentsBucketName:
    Description: >
      Documents S3 bucket for all runtime data.
      <fundId>/ — uploaded PDFs, extraction results, archives.
      INT#<uuid>/ and EXT#<id>/ — IC Memo flow documents.
    Value: !Ref DocumentsBucket
    Export:
      Name: !Sub "${AWS::StackName}-documents-bucket"

  FundsTableName:
    Description: DynamoDB table name for fund records.
    Value: !Ref FundsTable
    Export:
      Name: !Sub "${AWS::StackName}-funds-table"

  ProcessingQueueUrl:
    Description: >
      SQS URL for the document processing queue.
      FundUploadCompleteLambda writes here; FundDocumentProcessorLambda reads from here.
    Value: !Ref ProcessingQueue
    Export:
      Name: !Sub "${AWS::StackName}-processing-queue-url"

  ProcessingQueueArn:
    Description: SQS ARN for the processing queue.
    Value: !GetAtt ProcessingQueue.Arn
    Export:
      Name: !Sub "${AWS::StackName}-processing-queue-arn"

  ProcessingDLQUrl:
    Description: Dead-letter queue for failed processing jobs.
    Value: !Ref ProcessingQueueDLQ
    Export:
      Name: !Sub "${AWS::StackName}-processing-dlq-url"

  SuccessQueueUrl:
    Description: >
      SQS URL for success notifications.
      FundDocumentProcessorLambda writes here after successful Bedrock extraction.
    Value: !Ref SuccessQueue
    Export:
      Name: !Sub "${AWS::StackName}-success-queue-url"

  SuccessDLQUrl:
    Description: Dead-letter queue for undeliverable success messages.
    Value: !Ref SuccessQueueDLQ
    Export:
      Name: !Sub "${AWS::StackName}-success-dlq-url"

  ICMemoProcessingQueueUrl:
    Description: >
      SQS URL for the IC Memo processing queue.
      Send messages here to trigger FundDocumentProcessingWorkerLambda.
    Value: !Ref ICMemoProcessingQueue
    Export:
      Name: !Sub "${AWS::StackName}-icmemo-processing-queue-url"

  ICMemoProcessingQueueArn:
    Description: SQS ARN for the IC Memo processing queue.
    Value: !GetAtt ICMemoProcessingQueue.Arn
    Export:
      Name: !Sub "${AWS::StackName}-icmemo-processing-queue-arn"

  ICMemoProcessingDLQUrl:
    Description: Dead-letter queue for failed IC Memo processing jobs.
    Value: !Ref ICMemoProcessingQueueDLQ
    Export:
      Name: !Sub "${AWS::StackName}-icmemo-processing-dlq-url"

  TextractCompletionTopicArn:
    Description: SNS topic ARN — Textract publishes completion notifications here.
    Value: !Ref TextractCompletionTopic
    Export:
      Name: !Sub "${AWS::StackName}-textract-completion-topic-arn"

  TextractStarterQueueUrl:
    Description: SQS URL — s3UploadTrigger sends all document types here.
    Value: !Ref TextractStarterQueue
    Export:
      Name: !Sub "${AWS::StackName}-textract-starter-queue-url"

  TextractResultsQueueUrl:
    Description: SQS URL — subscribed to TextractCompletionTopic, triggers TextractResultsWorkerLambda.
    Value: !Ref TextractResultsQueue
    Export:
      Name: !Sub "${AWS::StackName}-textract-results-queue-url"

  TextractSNSRoleArn:
    Description: IAM role ARN passed to Textract for SNS notification publishing.
    Value: !GetAtt TextractSNSRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-textract-sns-role-arn"

  LambdaExecutionRoleArn:
    Description: IAM role ARN shared by all Lambda functions.
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-lambda-role-arn"

  UploadBucketName:
    Description: >
      Name of the managed upload bucket. Upload PDFs here using the folder convention
      <prefix>/<DocumentType>/<filename>.pdf to trigger S3UploadTriggerLambda.
    Value: !Ref UploadBucket
    Export:
      Name: !Sub "${AWS::StackName}-upload-bucket"

  S3UploadTriggerLambdaArn:
    Description: >
      ARN of the S3UploadTriggerLambda. S3 ObjectCreated events from UploadBucket
      are automatically routed here via the bucket NotificationConfiguration.
    Value: !GetAtt S3UploadTriggerLambda.Arn
    Export:
      Name: !Sub "${AWS::StackName}-s3-upload-trigger-arn"

  FormCheckBucketName:
    Description: S3 bucket for FormCheck PDF uploads (independent from the main upload bucket).
    Value: !Ref FormCheckBucket
    Export:
      Name: !Sub "${AWS::StackName}-formcheck-bucket"

  FormCheckTableName:
    Description: DynamoDB table for FormCheck job records (PK = jobId = FCHK#<uuid>).
    Value: !Ref FormCheckTable
    Export:
      Name: !Sub "${AWS::StackName}-formcheck-table"

  FormCheckTextractTopicArn:
    Description: SNS topic ARN for Textract to publish FormCheck completion notifications.
    Value: !Ref FormCheckTextractTopic
    Export:
      Name: !Sub "${AWS::StackName}-formcheck-textract-topic-arn"

  FormCheckResultsQueueUrl:
    Description: SQS URL subscribed to FormCheckTextractTopic, triggers FormCheckResultsWorkerLambda.
    Value: !Ref FormCheckResultsQueue
    Export:
      Name: !Sub "${AWS::StackName}-formcheck-results-queue-url"

  FormCheckStateMachineArn:
    Description: ARN of the FormCheck Step Functions state machine (Map-based parallel chunk analyzer).
    Value: !GetAtt FormCheckStateMachine.Arn
    Export:
      Name: !Sub "${AWS::StackName}-formcheck-sfn-arn"
